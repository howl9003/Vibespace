name: Deploy to EC2

# Auto-deploy on every push to the dedicated `production` branch (and on
# demand). This runs on a SELF-HOSTED GitHub Actions runner installed on the
# EC2 instance itself: the runner dials OUT to GitHub (long-poll), so there's
# no inbound SSH, no open port 22, no SSH key/secret to manage, and the public
# IP can change freely. The job runs the in-repo deploy script locally, which
# pulls + (restart or rebuild) the Docker stack on the box.
#
# One-time setup on the instance:
#   repo Settings -> Actions -> Runners -> New self-hosted runner (Linux x64)
#   run the shown ./config.sh ... on the instance, then install it as a service:
#     sudo ./svc.sh install && sudo ./svc.sh start
# The runner user (e.g. ubuntu) needs: the instance's git deploy key (already
# set up for cloning) and docker-group membership (the bootstrap adds it).

on:
  push:
    branches: [ "production" ]
  workflow_dispatch: {}

# Never let two deploys run at once on the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest + deploy
        run: |
          set -e
          cd "${EC2_REPO_DIR:-$HOME/archspace}"
          git fetch --prune origin "${{ github.ref_name }}"
          git checkout "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"
          bash docker/deploy/deploy.sh

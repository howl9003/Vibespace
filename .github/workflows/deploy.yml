name: Deploy to EC2

# Auto-deploy on every push to the deployment branch (and on demand). The
# workflow just SSHes into the EC2 instance and runs the in-repo deploy script,
# which pulls the new code and rebuilds/restarts the Docker stack. No image is
# built in CI — the instance builds it, matching the build-on-the-VPS model.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   EC2_HOST      public IP or DNS of the instance
#   EC2_USER      SSH user (e.g. "ubuntu")
#   EC2_SSH_KEY   private key whose public half is in the instance's
#                 ~/.ssh/authorized_keys
# Optional:
#   EC2_PORT      SSH port (default 22)
#   EC2_REPO_DIR  path to the repo checkout on the instance (default ~/archspace)

on:
  push:
    branches: [ "claude/festive-bohr-xk9fwc" ]
  workflow_dispatch: {}

# Never let two deploys run at once on the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          command_timeout: "20m"
          script: |
            set -e
            cd "${EC2_REPO_DIR:-$HOME/archspace}"
            # Fetch + reset first so we run the *latest* deploy.sh, then let it
            # do the full pull/rebuild for the pushed branch.
            git fetch --prune origin "${{ github.ref_name }}"
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            bash docker/deploy/deploy.sh

# Archspace nginx site — routes the web tier, auth service, static assets,
# and the *.as game pages (via the CGI adapter) to the game server.
server {
    listen 80 default_server;
    server_name _;
    root /var/www/localhost/htdocs;
    index index.html index.php;

    # charset of the original pages is normalized to UTF-8 by the adapter / PHP
    charset utf-8;

    client_max_body_size 4m;

    # --- real-time push bridge (Server-Sent Events) -------------------------
    # Exact match wins over the regex locations below. SSE needs buffering off
    # so each event flushes immediately, and a read timeout longer than the
    # bridge's ~55s lifetime so nginx doesn't sever the stream early.
    location = /auth/events.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_buffering off;
        fastcgi_read_timeout 120s;
        gzip off;
    }

    # --- modern auth service (register/login/logout/reset) ------------------
    location /auth/ {
        location ~ ^/auth/.*\.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # --- game pages: *.as -> CGI adapter -> game server (12350) -------------
    # The adapter forwards the as_session cookie so the game resolves the player.
    location ~ \.as$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.sock;
        fastcgi_param SCRIPT_FILENAME /usr/local/bin/as-cgi;
        fastcgi_param ARCHSPACE_GAME_HOST 127.0.0.1;
        fastcgi_param ARCHSPACE_GAME_PORT 12350;
        # pass the real request path/query to the adapter
        fastcgi_param PATH_INFO $uri;
    }

    # --- battle replay logs -------------------------------------------------
    # The engine writes per-battle turn-by-turn logs into the game-state volume
    # (BattleLogDir = /var/archspace/data/battle/<dayIdx>/<id>). Serve them
    # read-only as text so the HTML5 battle replay (battle-replay.js) can fetch
    # and animate them. battle_report2.cc emits the absolute path as LOG_URL;
    # the JS maps it to /battle_log/<dayIdx>/<id>. (Battle reports are searchable
    # by everyone in the original game, so open serving is faithful.)
    location /battle_log/ {
        alias /var/archspace/data/battle/;
        default_type text/plain;
        add_header Cache-Control "no-store";
        # logs are ids without extensions; don't let nginx guess otherwise
        types { }
    }

    # --- www tier PHP pages (main.php, active_players.php, ...) --------------
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # --- static: images, encyclopedia, css/js, html frames ------------------
    # /image/* (UI art), /encyclopedia/* (generated), beginners/faq/etc.
    location / {
        try_files $uri $uri/ =404;
    }

    # health endpoint
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}

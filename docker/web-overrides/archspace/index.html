<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2">
<title>::::ARCHSPACE::::</title>
<meta http-equiv="Cache-Control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<style>
  /* De-framed shell: the obsolete <frameset> is replaced by a CSS grid + two
     named iframes. The content iframe is named "contents" so every existing
     menu.as link with TARGET="contents" works unchanged. Same 2004 look. */
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  .as-shell {
    display: grid;
    grid-template-columns: 170px 1fr;
    height: 100vh; height: 100dvh;
  }
  .as-shell iframe { border: 0; width: 100%; height: 100%; display: block; background: #000; }
  .as-toggle { display: none; }
  .as-backdrop { display: none; }

  /* Mobile: collapse the left menu to a slide-in drawer with a toggle.
     On phones the content frame is full-width; opening the menu slides the
     drawer over it. A dimming backdrop covers the (fixed-width, legacy)
     content behind the drawer so its leftover edges don't read as stray
     panels, and tapping the backdrop closes the menu. */
  @media (max-width: 760px) {
    .as-shell { grid-template-columns: 1fr; }
    .as-menu {
      position: fixed; top: 0; left: 0; bottom: 0; width: 132px; z-index: 30;
      transform: translateX(-100%); transition: transform .2s ease;
      box-shadow: 2px 0 8px rgba(0,0,0,.6);
    }
    .as-shell.menu-open .as-menu { transform: translateX(0); }
    .as-backdrop {
      position: fixed; inset: 0; z-index: 20; background: #000;
      opacity: 0; visibility: hidden; transition: opacity .2s ease, visibility .2s ease;
    }
    .as-shell.menu-open ~ .as-backdrop { display: block; opacity: .92; visibility: visible; }
    .as-toggle {
      display: block; position: fixed; top: 6px; right: 6px; z-index: 40;
      background: #111; color: #ccc; border: 1px solid #444; border-radius: 4px;
      font: 16px/1 monospace; padding: 6px 10px; cursor: pointer;
    }
  }
</style>
</head>
<body>
  <div class="as-shell" id="as-shell">
    <iframe class="as-menu"     name="main menu" src="menu.as" title="menu"></iframe>
    <iframe class="as-contents" name="contents"  src="main.as" title="Archspace"></iframe>
  </div>
  <div class="as-backdrop" onclick="document.getElementById('as-shell').classList.remove('menu-open')"></div>
  <button class="as-toggle" type="button"
          onclick="document.getElementById('as-shell').classList.toggle('menu-open')">&#9776;</button>
  <noscript><p style="color:#ccc;font-family:monospace">Archspace</p></noscript>
  <!-- Real-time push: refresh the news feed the instant an event lands. -->
  <script src="/js/notifications.js"></script>
</body>
</html>

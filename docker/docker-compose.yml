# Archspace — single-image deployment (MariaDB + game server + web tier).
# Build context is the repo root so the Dockerfile can COPY archspace_source/.
#
#   docker compose -f docker/docker-compose.yml up --build
#
services:
  archspace:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: archspace:latest
    restart: unless-stopped
    ports:
      # web UI. Plain HTTP: set WEB_PORT=80 for a bare http://host. Behind the
      # https profile, bind to localhost (WEB_BIND=127.0.0.1) so only Caddy
      # (over the internal network) and the host reach it.
      - "${WEB_BIND:-0.0.0.0}:${WEB_PORT:-8080}:80"
    environment:
      TZ: UTC
      DB_PASS: comconq1     # internal DB password (not publicly exposed)
      # SMTP_HOST: smtp.example.com   # set to enable password-reset email;
      # SMTP_PORT: 587                # unset -> reset links are logged instead
      # SMTP_USER: ...
      # SMTP_PASS: ...
      # SMTP_FROM: archspace@example.com
    volumes:
      - db_data:/var/lib/mysql
      - game_state:/var/archspace/data   # news, battles, messages, audit — persisted
      - logs:/var/log/archspace
      # Fast iteration: bind-mount the sources the entrypoint re-assembles on
      # every start (web tier, page templates, nginx, setup scripts). A host
      # `git pull` + `docker compose restart` then applies UI/template/config
      # changes with NO image rebuild. Only C++ engine changes need --build.
      # Read-only: setup-runtime.sh copies+transforms these into the runtime
      # paths it reads, never writing back to the source.
      - ../web:/build/web:ro
      - ../docker/web-overrides:/build/docker/web-overrides:ro
      - ../archspace_source/archspace/src/web:/build/archspace/src/web:ro
      - ../archspace_source/archspace/src/form:/build/archspace/src/form:ro
      - ../docker/setup-web.sh:/usr/local/bin/setup-web.sh:ro
      - ../docker/setup-runtime.sh:/usr/local/bin/setup-runtime.sh:ro
      - ../docker/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ../docker/nginx.conf:/etc/nginx/sites-available/archspace:ro
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep -q ':12350'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Optional HTTPS front door (automatic Let's Encrypt TLS via Caddy).
  # Enable with the "https" profile and a DOMAIN that resolves to this host:
  #   DOMAIN=play.example.com docker compose --profile https up --build -d
  # Open inbound 80 + 443 in the security group; keep 8080 internal
  # (WEB_BIND=127.0.0.1). Caddy reaches the app as "archspace" on the network.
  caddy:
    image: caddy:2
    profiles: ["https"]
    restart: unless-stopped
    depends_on:
      - archspace
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"            # HTTP/3
    # NOTE: DOMAIN must be set when using --profile https (the bootstrap does
    # this). A default-empty avoids breaking plain `docker compose up`, since
    # compose interpolates variables for the whole file regardless of profile.
    environment:
      DOMAIN: ${DOMAIN:-}
      TLS_EMAIL: ${TLS_EMAIL:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  game_state:
  logs:
  caddy_data:
  caddy_config:

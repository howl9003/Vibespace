<body bgcolor="#000000" style="margin:0;" marginwidth="0" marginheight="0" text="#999999" link="#999999" vlink="#999999" alink="#999999">
<TABLE WIDTH="610" BORDER="0" CELLSPACING="0" CELLPADDING="0">
  <TR><TD>
    <TABLE WIDTH=590 BORDER="0" CELLSPACING="0" CELLPADDING="0" HEIGHT="100" BGCOLOR="#000000" ALIGN="center">
      <TR ALIGN="center" VALIGN="middle"><TD>$ADLINE</TD></TR>
    </TABLE>
  </TD></TR>
  <TR><TD ALIGN="center">
    <TABLE WIDTH=550 BORDER=0 CELLSPACING=0 CELLPADDING=0>
      <TR BGCOLOR=$RACE_BG_COLOR><TD CLASS="maintext">
        <DIV ALIGN="CENTER" CLASS="white"><IMG SRC=$SMALL_RACE_IMAGE ALIGN=absmiddle>$RACE_NAME&nbsp;&nbsp;&nbsp;&nbsp;$PRODUCT_POINT&nbsp;&nbsp;&nbsp;&nbsp;$PLANET_COUNT&nbsp;&nbsp;&nbsp;&nbsp;$POPULATION</DIV>
      </TD></TR>
    </TABLE>
  </TD></TR>
  <TR><TD><P>&nbsp;</P></TD></TR>
  <TR><TD ALIGN="center" HEIGHT="18"><IMG SRC="$IMAGE_SERVER_URL/image/as_game/fleet/defense_plan_title.gif" WIDTH="439" HEIGHT="41"></TD></TR>
  <TR><TD ALIGN="center"><P>&nbsp;</P></TD></TR>
  <TR>
    <TH ALIGN="center" CLASS="maintext" HEIGHT="25">
      <TABLE WIDTH="600" BORDER="0" CELLSPACING="0" CELLPADDING="0">
        <TR CLASS="maintext"><TD>
        <!-- Fleet deployment board: HTML5 replacement for the dead defense.js board. -->
        <div id="as-deploy-params" style="display:none">
        $FLEET_INDEX_TO_ID
        <param name="TARGET"   value="defense_plan_special_new_result.as">
        <param name="IMAGEDIR" value="$IMAGEDIR/">
        </div>
        <form id="as-deploy-form" method="post" action="defense_plan_special_new_result.as">
          <input type="hidden" name="PLAN_NAME"             value="$PLAN_NAME">
          <input type="hidden" name="FLEET_NUMBER"          value="$FLEET_NUMBER">
          <input type="hidden" name="RACE_CONDITION"        value="$RACE_CONDITION">
          <input type="hidden" name="POWER_MIN"             value="$POWER_MIN">
          <input type="hidden" name="POWER_MAX"             value="$POWER_MAX">
          <input type="hidden" name="ATTACK_TYPE_CONDITION" value="$ATTACK_TYPE_CONDITION">
          <canvas id="as-deploy-board" width="630" height="275"
                  style="display:block;background:#050510;cursor:crosshair;border:1px solid #223355;">
          </canvas>
          <div style="margin-top:6px;text-align:center;">
            <input type="submit" value="Save Defense Plan"
                   style="background:#0d2244;color:#ccddff;border:1px solid #4477cc;
                          padding:4px 18px;cursor:pointer;font-size:13px;">
          </div>
        </form>
        <script src="/js/as-deploy.js"></script>
        </TD></TR>
      </TABLE>
    </TH>
  </TR>
  <TR><TD ALIGN="center">&nbsp;</TD></TR>
  <TR><TD CLASS="maintext" ALIGN="center"> <A HREF="war.as">$WAR_MAIN</A> <A HREF="siege_planet.as">$SIEGE_PLANET</A> <A HREF="blockade.as">$BLOCKADE</A> <A HREF="raid.as">$RAID</A> <A HREF="privateer.as">$PRIVATEER</A> <FONT COLOR="616161">$DEFENSE_PLAN</FONT> <A HREF="battle_report.as">$BATTLE_REPORT</A></TD></TR>
  <TR><TD>&nbsp;</TD></TR>

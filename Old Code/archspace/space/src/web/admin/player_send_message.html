          <TD>

        </TR>
      </TABLE>

        <TR BGCOLOR=$RACE_BG_COLOR> 
          <TD CLASS="maintext"> 
            <DIV ALIGN="CENTER" CLASS="white"> <IMG SRC=$SMALL_RACE_IMAGE ALIGN=absmiddle>$RACE_NAME&nbsp;&nbsp;&nbsp;&nbsp;$PRODUCT_POINT

  <TR> 
    <TD> 
      <P>&nbsp; </P>
    </TD>
  </TR>
  <TR> 
    <TD CLASS=maintext ALIGN=center></TD>
  </TR>
  <TR> 
    <TD ALIGN=center> 
      <P><IMG SRC="http://$IMAGE_SERVER_URL/image/as_game/diplomacy/diplomatic_message_title.gif" WIDTH="439" HEIGHT="41"> 
      </P>
    </TD>
  </TR>
  <TR> 
    <TD ALIGN=center>&nbsp;</TD>
  </TR>

    <TD ALIGN=center>

          <TD COLSPAN="3" CLASS="tabletxt" VALIGN="MIDDLE"> 
            <TEXTAREA NAME="COMMENT" WRAP="VIRTUAL" COLS="55" ROWS="5"></TEXTAREA>
          </TD>
        </TR>
      </TABLE>
    </TD>
  </TR>
  <TR> 
    <TD ALIGN=center>&nbsp;</TD>

  <TR> 
    <TD ALIGN=center><INPUT TYPE=image SRC="http://$IMAGE_SERVER_URL/image/as_game/bu_send_1.gif" BORDER="0"></TD>

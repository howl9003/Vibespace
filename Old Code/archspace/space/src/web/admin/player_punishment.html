<html>
<head>

<body bgcolor="#000000" style="margin:0;" marginwidth="0" marginheight="0" link="#999999" vlink="#999999" alink="#999999" onLoad="MM_preloadImages('http://$IMAGE_SERVER_URL/image/as_game/bu_helpen.gif')">
<TABLE WIDTH=609 BORDER=0 CELLSPACING=0 CELLPADDING=0>
  <TR> 
    <TD>
      <TABLE WIDTH=590 BORDER=0 CELLSPACING=0 CELLPADDING=0 HEIGHT=100 BGCOLOR=#000000 ALIGN=center>
        <TR ALIGN=center VALIGN=middle> 
          <TD>
            $ADLINE
          </TD>
        </TR>
      </TABLE>
    </TD>
  </TR>
  <TR> 
    <TD ROWSPAN=2 ALIGN=center> 
      <TABLE WIDTH=550 BORDER=0 CELLSPACING=0 CELLPADDING=0>
        <TR BGCOLOR=$RACE_BG_COLOR> 
          <TD CLASS="maintext"> 
            <DIV ALIGN="CENTER" CLASS="white"> <IMG SRC=$SMALL_RACE_IMAGE ALIGN=absmiddle>$RACE_NAME&nbsp;&nbsp;&nbsp;&nbsp;$PRODUCT_POINT
              &nbsp;&nbsp;&nbsp;&nbsp;$PLANET_COUNT&nbsp;&nbsp;&nbsp;&nbsp;$POPULATION
            </DIV>
          </TD>
          <!--HELP BUTTON-->
        </TR>
      </TABLE>
    </TD>
  </TR>
    <TD> 
      <P>&nbsp; </P>
    </TD>
  </TR>
  <TR> 
    <TD CLASS=maintext ALIGN=center></TD>
  </TR>
  <TR> 
    <TD ALIGN=center> 
      <P><IMG SRC="http://$IMAGE_SERVER_URL/image/as_game/diplomacy/diplomatic_message_title.gif"> 
      </P>
    </TD>
  </TR>
  <TR> 
    <TD ALIGN=center>&nbsp;</TD>
  </TR>
  <TR> 
    <TD ALIGN=center>
      <TABLE WIDTH="550" BORDER="0" CELLSPACING="0" CELLPADDING="0" BORDERCOLOR="#2A2A2A">
        <FORM METHOD=post ACTION="player_punishment_result.as"> 
        <TR> 
          <TD CLASS="tabletxt" WIDTH="150">
            $STRING_IMPERIAL_RETRIBUTION
          </TD>
          <TD CLASS="tabletxt">
            <INPUT TYPE=hidden NAME=BY_WHAT VALUE=IMPERIAL_RETRIBUTION>
            &nbsp;<INPUT TYPE=image SRC="http://$IMAGE_SERVER_URL/image/as_game/bu_execute.gif">
          </TD>
        </TR>
        </FORM>
        <FORM METHOD=post ACTION="player_punishment_result.as"> 
        <TR> 
          <TD CLASS="tabletxt" WIDTH="150">
            $STRING_REMOVE_IMPERIAL_RETRIBUTION
          </TD>
          <TD CLASS="tabletxt">
            <INPUT TYPE=hidden NAME=BY_WHAT VALUE=REMOVE_IMPERIAL_RETRIBUTION>
            &nbsp;<INPUT TYPE=image SRC="http://$IMAGE_SERVER_URL/image/as_game/bu_execute.gif">
          </TD>
        </TR>
        </FORM>
        <FORM METHOD=post ACTION="player_punishment_result.as"> 
        <TR> 
          <TD CLASS="tabletxt" WIDTH="150">
            $STRING_SKIP_TURN_PUNISHMENT
          </TD>
          <TD CLASS="tabletxt">&nbsp;
            <INPUT TYPE=hidden NAME=BY_WHAT VALUE=SKIP_TURN>
            <INPUT TYPE=input NAME=TURN>&nbsp;$STRING_TURN_S_&nbsp;<INPUT TYPE=image SRC="http://$IMAGE_SERVER_URL/image/as_game/bu_execute.gif">
          </TD>
        </TR>
        </FORM>
        <FORM METHOD=post ACTION="player_punishment_delete_character_confirm.as"> 
        <TR> 
          <TD CLASS="tabletxt" WIDTH="150">
            $STRING_TO_MAKE_THIS_PLAYER_DEAD
          </TD>
          <TD CLASS="tabletxt">&nbsp;
            <INPUT TYPE=hidden NAME=BY_WHAT VALUE=TO_MAKE_THIS_PLAYER_DEAD>
            <INPUT TYPE=image SRC="http://$IMAGE_SERVER_URL/image/as_game/bu_execute.gif">
          </TD>
        </TR>
        </FORM>
        <FORM METHOD=post ACTION="player_punishment_delete_character_confirm.as"> 
        <TR> 
          <TD CLASS="tabletxt" WIDTH="150">
            $STRING_DELETE_THIS_PLAYER
          </TD>
          <TD CLASS="tabletxt">&nbsp;
            <INPUT TYPE=hidden NAME=BY_WHAT VALUE=DELETE_THIS_PLAYER>
            <INPUT TYPE=image SRC="http://$IMAGE_SERVER_URL/image/as_game/bu_execute.gif">
          </TD>
        </TR>
        </FORM>
        <FORM METHOD=post ACTION="player_punishment_delete_character_confirm.as"> 
        <TR> 
          <TD CLASS="tabletxt" WIDTH="150">
            $STRING_DELETE_PORTAL_DATA
          </TD>

        </TR>

    <TD ALIGN=center>&nbsp;</TD>
  </TR>
  <TR> 
    <TD ALIGN=center>
      <A HREF="player.as"><IMG SRC="http://$IMAGE_SERVER_URL/image/as_game/bu_back.gif" BORDER="0"></A>
